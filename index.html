<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>triXter NFT - Public Mint</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.10.0/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  
  <style>
    body { 
      background-color: #00021d; 
      color: #e5e7eb; 
      font-family: Arial, Helvetica, sans-serif;
    }
    .mint-btn, .connect-btn {
      background: linear-gradient(to right, #4083f4, #b48caf, #4083f4);
      transition: all 0.4s;
      color: #1c3cbd;
      font-weight: bold;
    }
    .mint-btn:hover, .connect-btn:hover {
      background: linear-gradient(to right, #60a5fa, #d4a3c2, #60a5fa);
      transform: scale(1.05);
      color: #f8d7e8 !important;
      text-shadow: 0 0 15px #ef6bf4, 0 0 25px #e07ab8;
    }
    .logo {
      filter: none;
    }
    .price-text {
      font-size: 4.5rem;
      line-height: 1.1;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-2xl mx-auto pt-20 px-6 text-center">
    
    <!-- Логотип -->
    <img src="logo.png" alt="triXter NFT" class="logo mx-auto w-full max-w-2xl mb-8">

    <p class="text-4xl font-bold text-[#ef6bf4] mb-12">PUBLIC MINT FIRST PHASE</p>

    <!-- Progress -->
    <div class="mb-10">
      <div class="flex justify-between text-sm mb-2 font-medium">
        <span>Minted</span>
        <span id="minted-count">777 / 70,000</span>
      </div>
      <div class="h-4 bg-gray-700 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-purple-500 to-pink-500 transition-all" style="width: 1.11%"></div>
      </div>
      <p id="remaining" class="text-sm text-[#ef6bf4] mt-2">69,223 remaining</p>
    </div>

    <div class="bg-[#070f38] border border-gray-700 rounded-3xl p-10">
      <p class="text-3xl mb-3">Price per NFT</p>
      <p class="price-text font-bold text-white mb-8 leading-none">
        777<br>
        <span class="text-3xl text-gray-400">POL (MATIC)</span>
      </p>

      <div class="mb-8">
        <label class="block text-sm mb-3 text-gray-400">Quantity (max 10)</label>
        <input type="number" id="amount" value="1" min="1" max="10"
               class="w-40 mx-auto block text-center text-5xl bg-[#1c3cbd] text-white border border-gray-600 rounded-2xl py-6 focus:outline-none focus:border-pink-400">
      </div>

      <button onclick="mint()" 
              class="mint-btn w-full py-8 text-4xl font-bold rounded-2xl shadow-lg mb-4">
        MINT NOW
      </button>

      <button onclick="connectWallet()" id="connectBtn"
              class="connect-btn w-full py-4 text-lg font-bold rounded-2xl shadow-lg">
        Connect Wallet
      </button>
    </div>

    <p id="wallet-info" class="text-center text-sm text-gray-500 mt-8 min-h-[24px]"></p>
  </div>

  <script>
    let web3, contract, userAddress;
    const contractAddress = "0x1D5B687Bc6Cb63c8A7A05B2Fc7C9f3F4538C1D61";

    const abi = [{"inputs":[{"internalType":"uint256","name":"quantity","type":"uint256"}],"name":"mint","outputs":[],"stateMutability":"payable","type":"function"}];

    async function switchToPolygon() {
      try {
        await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: '0x89' }] });
      } catch (error) {
        if (error.code === 4902) {
          await window.ethereum.request({ method: 'wallet_addEthereumChain', params: [{ 
            chainId: '0x89', chainName: 'Polygon Mainnet', nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 }, rpcUrls: ['https://polygon-rpc.com'], blockExplorerUrls: ['https://polygonscan.com'] 
          }]});
        }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) return alert("Please install MetaMask!");
      web3 = new Web3(window.ethereum);
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      userAddress = accounts[0];
      await switchToPolygon();
      contract = new web3.eth.Contract(abi, contractAddress);

      document.getElementById("wallet-info").innerHTML = 
        `Connected: <span class="text-purple-400">${userAddress.slice(0,6)}...${userAddress.slice(-4)}</span>`;
      document.getElementById("connectBtn").textContent = "Wallet Connected ✓";
    }

    async function mint() {
      if (!contract) { await connectWallet(); return; }

      const amount = parseInt(document.getElementById("amount").value);
      const totalPrice = 777 * amount;

      try {
        await contract.methods.mint(amount).send({
          from: userAddress,
          value: web3.utils.toWei(totalPrice.toString(), 'ether')
        });

        confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
        setTimeout(() => confetti({ particleCount: 150, angle: 60, spread: 70 }), 250);

        alert(`🎉 Congratulations! You successfully minted ${amount} triXter NFT!`);
      } catch (err) {
        alert("Mint error: " + (err.message || err));
      }
    }

    window.onload = () => {
      const minted = 777;
      const total = 70000;
      document.getElementById("minted-count").textContent = `${minted} / ${total}`;
      document.getElementById("progress-bar").style.width = `${(minted / total) * 100}%`;
      document.getElementById("remaining").textContent = `${total - minted} remaining`;
    };
  </script>
</body>
</html>
